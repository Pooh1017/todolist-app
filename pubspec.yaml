name: to_dolist
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+2

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  
  cupertino_icons: ^1.0.8
  font_awesome_flutter: ^10.12.0
  http: ^1.2.0

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.0.0
  google_sign_in: ^6.2.2
  flutter_facebook_auth: ^7.1.1

  # UI
  table_calendar: ^3.1.2
  intl: ^0.20.2

  # Database
  sqflite: ^2.3.3
  path: ^1.9.0
  uuid: ^4.5.1

  # Utilities
  share_plus: ^10.0.2
  shared_preferences: ^2.2.3
  url_launcher: ^6.3.0

  # Notifications
  flutter_local_notifications: ^17.2.3
  timezone: ^0.9.2

  flutter_localizations:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/icons/

flutter_icons:
  android: true
  ios: true
  image_path: assets/images/logo.png
  min_sdk_android: 21